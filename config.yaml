experiment:
  wandb_project: "loc_prediction"
  seed: 42

data:
  path: "data/"

models:
  svm:
    enabled: false
    input: "features"
    pca_components: 0  # SVM benefits from full feature space; PCA can hurt margin geometry
    C: 1.0
    gamma: "scale"
    kernel: "rbf"

  rf:
    enabled: false
    input: "features"
    pca_components: 30
    n_estimators: 100
    max_depth: 4
    min_samples_leaf: 2

  rnn:
    enabled: true
    input: "raw"
    pca_components: 30  # Raw temporal signals; PCA applied channel-wise loses temporal structure
    hidden_size: 8
    num_layers: 2
    dropout: 0.2
    lr: 0.001
    max_epochs: 50 # small number to not overfit too much on the data

evaluation:
  threshold: 0.5
  time_to_event_bins: #testing how long before the event the model actually identified it
    - 60
    - 20
    - 10
    - 0
  input_length: 100
  pred_horizon: 20
